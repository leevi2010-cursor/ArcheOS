<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>元枢 ArcheOS 双工作台原型</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark" aria-hidden="true">A</span><div><strong>元枢 ArcheOS</strong><span>双工作台交互原型</span></div></div>
      <div class="role-label" id="roleLabel"></div>
      <nav id="mainNav" aria-label="工作台导航"></nav>
    </aside>
    <main class="main-content">
      <header class="topbar-lite">
        <div class="current-scope"><strong id="scopeRole"></strong><span aria-hidden="true">·</span><span>Amazon US Store</span></div>
        <button class="role-switch" id="roleSwitch">我的</button>
      </header>
      <div id="app" tabindex="-1"></div>
    </main>
  </div>
  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="drawer" id="drawer" aria-label="任务详情" aria-hidden="true"><div id="drawerContent"></div></aside>
  <dialog id="roleDialog"><form method="dialog"><header><div><small>我的</small><h2>身份与工作空间</h2></div><button class="icon-button" value="cancel" aria-label="关闭">×</button></header><div class="profile-context"><div><span>当前身份</span><strong id="contextRole"></strong></div><div><span>Workspace</span><strong>Amazon US Store</strong></div><div><span>权限范围</span><strong id="contextPermission"></strong></div><div><span>环境</span><strong>交互原型 / 假数据</strong></div></div><p class="dialog-note">切换身份会同步改变导航、默认首页和可操作范围，Workspace 保持不变。</p><div class="role-options"><button value="operator" data-role="operator"><strong>店铺经营者</strong><span>经营结果、配置、审批、异常恢复</span></button><button value="admin" data-role="admin"><strong>平台管理者</strong><span>平台资产、发布、部署与跨 Agent 治理</span></button></div></form></dialog>
  <script src="./app.js"></script>
</body>
</html>
