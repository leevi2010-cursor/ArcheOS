<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1240" viewBox="0 0 1800 1240" role="img" aria-labelledby="title desc">
  <title id="title">ArcheOS v0.4 evolutionary product blueprint</title>
  <desc id="desc">A top-down product stack from business experience through agents, governed assets, runtime integrations and external business, with a right-side control plane and phased evolution.</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fc}.panel{fill:#fff;stroke:#c9d1df;stroke-width:2}.lane1{fill:#eef4ff;stroke:#3b67ad}.lane2{fill:#edf9f3;stroke:#34815c}.lane3{fill:#f6f0ff;stroke:#7751a8}.lane4{fill:#fff7e8;stroke:#a97620}.lane5{fill:#f3f5f8;stroke:#60708a}.control{fill:#edf3ff;stroke:#315ca8;stroke-width:3}.node{fill:#fff;stroke:#8c99ad;stroke-width:1.5}.next{stroke-dasharray:8 6}.future{stroke-dasharray:3 6}.title{font:700 31px system-ui;fill:#17233a}.subtitle{font:16px system-ui;fill:#52617a}.laneTitle{font:700 20px system-ui;fill:#18243a}.nodeTitle{font:700 15px system-ui;fill:#1b2940}.nodeText{font:13px system-ui;fill:#52617a}.small{font:12px system-ui;fill:#66758d}.phase{font:700 11px system-ui}.phaseMvp{fill:#207044}.phaseNext{fill:#7952a8}.phaseFuture{fill:#9a6817}.edge{fill:none;stroke:#455672;stroke-width:2.5}.gov{fill:none;stroke:#315ca8;stroke-width:2;stroke-dasharray:9 7}.feedback{fill:none;stroke:#7751a8;stroke-width:2.5;stroke-dasharray:8 7}.contract{fill:#fff;stroke:#66758d;stroke-width:1.5}.contractText{font:700 13px system-ui;fill:#273650}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#455672"/></marker>
    <marker id="blueArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#315ca8"/></marker>
    <marker id="purpleArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#7751a8"/></marker>
  </defs>
  <rect class="bg" width="1800" height="1240"/>
  <text x="45" y="55" class="title">ArcheOS 元枢 · 可演进产品架构蓝图</text>
  <text x="45" y="84" class="subtitle">稳定对象内核 + 分阶段产品分面　｜　主路径：Business → Agent → Skill / Tool → Runtime → External System</text>
  <g transform="translate(1160 38)"><rect x="0" y="0" width="78" height="28" rx="14" fill="#e7f5ed"/><text x="39" y="19" text-anchor="middle" class="phase phaseMvp">v0.1 MVP</text><rect x="90" y="0" width="102" height="28" rx="14" fill="#f2eafb"/><text x="141" y="19" text-anchor="middle" class="phase phaseNext">Next stage</text><rect x="204" y="0" width="102" height="28" rx="14" fill="#fff2d7"/><text x="255" y="19" text-anchor="middle" class="phase phaseFuture">Future</text></g>

  <rect x="40" y="112" width="1230" height="875" rx="18" class="panel"/>
  <rect x="70" y="142" width="1165" height="132" rx="14" class="lane1"/>
  <text x="92" y="174" class="laneTitle">1 · Experience &amp; Business Integration</text>
  <g><rect x="92" y="191" width="245" height="62" rx="10" class="node"/><text x="214" y="216" text-anchor="middle" class="nodeTitle">Business Cockpit</text><text x="214" y="239" text-anchor="middle" class="nodeText">双工作台 · 身份 / Workspace</text></g>
  <g><rect x="355" y="191" width="245" height="62" rx="10" class="node"/><text x="477" y="216" text-anchor="middle" class="nodeTitle">经营者体验</text><text x="477" y="239" text-anchor="middle" class="nodeText">导向 · 凭证 · 审批 · 结果</text></g>
  <g><rect x="618" y="191" width="245" height="62" rx="10" class="node"/><text x="740" y="216" text-anchor="middle" class="nodeTitle">平台管理体验</text><text x="740" y="239" text-anchor="middle" class="nodeText">Agent Factory · 资产 · 部署</text></g>
  <g><rect x="881" y="191" width="155" height="62" rx="10" class="node next"/><text x="958" y="216" text-anchor="middle" class="nodeTitle">多 Workspace</text><text x="958" y="239" text-anchor="middle" class="nodeText">角色与资产共享</text></g>
  <g><rect x="1054" y="191" width="155" height="62" rx="10" class="node future"/><text x="1131" y="216" text-anchor="middle" class="nodeTitle">多业务产品</text><text x="1131" y="239" text-anchor="middle" class="nodeText">交付 · 授权 · 售卖</text></g>

  <rect x="70" y="296" width="1165" height="145" rx="14" class="lane2"/>
  <text x="92" y="328" class="laneTitle">2 · Agent Management &amp; Execution</text>
  <g><rect x="92" y="347" width="210" height="70" rx="10" class="node"/><text x="197" y="374" text-anchor="middle" class="nodeTitle">Agent Factory</text><text x="197" y="397" text-anchor="middle" class="nodeText">Profile 草案 · 验证 · 发布</text></g>
  <g><rect x="320" y="347" width="210" height="70" rx="10" class="node"/><text x="425" y="374" text-anchor="middle" class="nodeTitle">Amazon Agent Deployment</text><text x="425" y="397" text-anchor="middle" class="nodeText">职责 · 资产 · 权限 · Schedule</text></g>
  <g><rect x="548" y="347" width="190" height="70" rx="10" class="node"/><text x="643" y="374" text-anchor="middle" class="nodeTitle">Intent Resolver</text><text x="643" y="397" text-anchor="middle" class="nodeText">导向 → Policy + 参数</text></g>
  <g><rect x="756" y="347" width="190" height="70" rx="10" class="node"/><text x="851" y="374" text-anchor="middle" class="nodeTitle">Scheduler / Task State</text><text x="851" y="397" text-anchor="middle" class="nodeText">计划 · 执行 · 暂停 · 恢复</text></g>
  <g><rect x="964" y="347" width="245" height="70" rx="10" class="node next"/><text x="1086" y="374" text-anchor="middle" class="nodeTitle">更多 Domain Agents</text><text x="1086" y="397" text-anchor="middle" class="nodeText">领域包 · 模板 · 多 Runtime</text></g>

  <rect x="70" y="463" width="1165" height="175" rx="14" class="lane3"/>
  <text x="92" y="495" class="laneTitle">3 · Governed Assets</text>
  <g><rect x="92" y="516" width="215" height="86" rx="10" class="node"/><text x="199" y="542" text-anchor="middle" class="nodeTitle">Composite Skills</text><text x="199" y="565" text-anchor="middle" class="nodeText">读取 · 诊断 · 决策 · 报告</text><text x="199" y="585" text-anchor="middle" class="small">内部编排 Tool / 子 Skill</text></g>
  <g><rect x="325" y="516" width="180" height="86" rx="10" class="node"/><text x="415" y="542" text-anchor="middle" class="nodeTitle">Tool Adapters</text><text x="415" y="565" text-anchor="middle" class="nodeText">Amazon / DB / Files</text><text x="415" y="585" text-anchor="middle" class="small">Ops Kit 来源追踪</text></g>
  <g><rect x="523" y="516" width="180" height="86" rx="10" class="node"/><text x="613" y="542" text-anchor="middle" class="nodeTitle">Policy</text><text x="613" y="565" text-anchor="middle" class="nodeText">允许 · 禁止 · 审批</text><text x="613" y="585" text-anchor="middle" class="small">作用域 · 优先级 · 例外</text></g>
  <g><rect x="721" y="516" width="180" height="86" rx="10" class="node"/><text x="811" y="542" text-anchor="middle" class="nodeTitle">Measure</text><text x="811" y="565" text-anchor="middle" class="nodeText">公式 · 窗口 · 解释</text><text x="811" y="585" text-anchor="middle" class="small">业务 / Agent / Skill</text></g>
  <g><rect x="919" y="516" width="140" height="86" rx="10" class="node"/><text x="989" y="542" text-anchor="middle" class="nodeTitle">Knowledge Ref</text><text x="989" y="565" text-anchor="middle" class="nodeText">Tolaria 来源</text><text x="989" y="585" text-anchor="middle" class="small">不复制事实</text></g>
  <g><rect x="1077" y="516" width="132" height="86" rx="10" class="node next"/><text x="1143" y="542" text-anchor="middle" class="nodeTitle">Asset Catalog</text><text x="1143" y="565" text-anchor="middle" class="nodeText">版本 · 依赖</text><text x="1143" y="585" text-anchor="middle" class="small">发现 · 影响</text></g>
  <rect x="335" y="611" width="640" height="22" rx="11" fill="#e9def8"/><text x="655" y="627" text-anchor="middle" class="small">Capability View = f(Skills, Tools, Permissions, Policy, Evidence) · 派生 / 可重建 / 不参与执行</text>

  <rect x="70" y="660" width="1165" height="145" rx="14" class="lane4"/>
  <text x="92" y="692" class="laneTitle">4 · Runtime, Data &amp; Integration</text>
  <g><rect x="92" y="711" width="200" height="70" rx="10" class="node"/><text x="192" y="738" text-anchor="middle" class="nodeTitle">Runtime Adapter</text><text x="192" y="761" text-anchor="middle" class="nodeText">Hermes / 可插拔 Runtime</text></g>
  <g><rect x="310" y="711" width="190" height="70" rx="10" class="node"/><text x="405" y="738" text-anchor="middle" class="nodeTitle">Data Connectors</text><text x="405" y="761" text-anchor="middle" class="nodeText">报表 · 订单 · 成本</text></g>
  <g><rect x="518" y="711" width="190" height="70" rx="10" class="node"/><text x="613" y="738" text-anchor="middle" class="nodeTitle">Secret Provider</text><text x="613" y="761" text-anchor="middle" class="nodeText">SecretRef · 最小权限</text></g>
  <g><rect x="726" y="711" width="190" height="70" rx="10" class="node"/><text x="821" y="738" text-anchor="middle" class="nodeTitle">Writer Coordination</text><text x="821" y="761" text-anchor="middle" class="nodeText">Lease · fencing token</text></g>
  <g><rect x="934" y="711" width="160" height="70" rx="10" class="node"/><text x="1014" y="738" text-anchor="middle" class="nodeTitle">Write Ledger</text><text x="1014" y="761" text-anchor="middle" class="nodeText">幂等 · readback</text></g>
  <g><rect x="1112" y="711" width="97" height="70" rx="10" class="node next"/><text x="1160" y="738" text-anchor="middle" class="nodeTitle">Fleet</text><text x="1160" y="761" text-anchor="middle" class="nodeText">漂移 / 成本</text></g>

  <rect x="70" y="827" width="1165" height="130" rx="14" class="lane5"/>
  <text x="92" y="859" class="laneTitle">5 · External Business &amp; Evidence Feedback</text>
  <g><rect x="92" y="878" width="220" height="58" rx="10" class="node"/><text x="202" y="902" text-anchor="middle" class="nodeTitle">Amazon Ads / SP-API</text><text x="202" y="923" text-anchor="middle" class="nodeText">业务事实 · 外部写入结果</text></g>
  <g><rect x="330" y="878" width="210" height="58" rx="10" class="node"/><text x="435" y="902" text-anchor="middle" class="nodeTitle">Observation / Trace</text><text x="435" y="923" text-anchor="middle" class="nodeText">不可变证据 · 数据新鲜度</text></g>
  <g><rect x="558" y="878" width="195" height="58" rx="10" class="node"/><text x="655" y="902" text-anchor="middle" class="nodeTitle">Evaluation Process</text><text x="655" y="923" text-anchor="middle" class="nodeText">Measure + Policy + 证据</text></g>
  <g><rect x="771" y="878" width="195" height="58" rx="10" class="node"/><text x="868" y="902" text-anchor="middle" class="nodeTitle">Change Control</text><text x="868" y="923" text-anchor="middle" class="nodeText">候选 · 验证 · 审批</text></g>
  <g><rect x="984" y="878" width="225" height="58" rx="10" class="node"/><text x="1096" y="902" text-anchor="middle" class="nodeTitle">Release / Rollback</text><text x="1096" y="923" text-anchor="middle" class="nodeText">版本指针 · 后续观察</text></g>

  <path d="M477 253V288" class="edge" marker-end="url(#arrow)"/><path d="M425 417V455" class="edge" marker-end="url(#arrow)"/><path d="M415 602V652" class="edge" marker-end="url(#arrow)"/><path d="M405 781V819" class="edge" marker-end="url(#arrow)"/>
  <path d="M1096 878C1096 842 1188 832 1220 792" class="feedback" marker-end="url(#purpleArrow)"/>

  <rect x="1300" y="112" width="460" height="875" rx="18" class="control"/>
  <text x="1530" y="154" text-anchor="middle" class="laneTitle">ArcheOS Control Plane</text><text x="1530" y="178" text-anchor="middle" class="small">统一治理 · 标准 · 生命周期 · 进化</text>
  <g><rect x="1330" y="202" width="400" height="102" rx="12" class="node"/><text x="1352" y="230" class="nodeTitle">1 · Architecture &amp; Contracts</text><text x="1352" y="254" class="nodeText">对象边界 · 命名版本 · Agent / Skill / Event / Data Contracts</text><text x="1352" y="278" class="small">循环依赖 · 兼容性 · ADR</text></g>
  <g><rect x="1330" y="320" width="400" height="102" rx="12" class="node"/><text x="1352" y="348" class="nodeTitle">2 · Identity, Security &amp; Approval</text><text x="1352" y="372" class="nodeText">RBAC / ABAC · Workspace · SecretRef · Policy Decision</text><text x="1352" y="396" class="small">写入审批 · 紧急停止 · 人工接管</text></g>
  <g><rect x="1330" y="438" width="400" height="102" rx="12" class="node"/><text x="1352" y="466" class="nodeTitle">3 · Asset Lifecycle</text><text x="1352" y="490" class="nodeText">Catalog · 来源 · 版本依赖 · Change · Release / Rollback</text><text x="1352" y="514" class="small">Capability View · 状态 · 影响分析</text></g>
  <g><rect x="1330" y="556" width="400" height="102" rx="12" class="node next"/><text x="1352" y="584" class="nodeTitle">4 · Quality &amp; Evaluation</text><text x="1352" y="608" class="nodeText">Measure · 回归场景 · 受限验证 · 有效性评价</text><text x="1352" y="632" class="small">发布门禁 · 安全线 · 质量证据</text></g>
  <g><rect x="1330" y="674" width="400" height="102" rx="12" class="node"/><text x="1352" y="702" class="nodeTitle">5 · Operations &amp; Observability</text><text x="1352" y="726" class="nodeText">Runtime 状态 · Trace · 告警 · Writer 协调 · 审计</text><text x="1352" y="750" class="small">数据新鲜度 · 资源 / 成本（后续）</text></g>
  <g><rect x="1330" y="792" width="400" height="102" rx="12" class="node next"/><text x="1352" y="820" class="nodeTitle">6 · Knowledge &amp; Memory Governance</text><text x="1352" y="844" class="nodeText">Tolaria 引用 · 来源 · 提升审批 · 回写 · 保留</text><text x="1352" y="868" class="small">知识不是 Policy；Observation 不可改写</text></g>
  <g><rect x="1330" y="910" width="400" height="48" rx="12" class="node future"/><text x="1530" y="940" text-anchor="middle" class="nodeTitle">Organization · Tenant · Commercial Governance</text></g>

  <path d="M1300 253H1245" class="gov" marker-end="url(#blueArrow)"/><path d="M1300 371H1245" class="gov" marker-end="url(#blueArrow)"/><path d="M1300 489H1245" class="gov" marker-end="url(#blueArrow)"/><path d="M1300 607H1245" class="gov" marker-end="url(#blueArrow)"/><path d="M1300 725H1245" class="gov" marker-end="url(#blueArrow)"/><path d="M1300 843H1245" class="gov" marker-end="url(#blueArrow)"/>

  <text x="40" y="1025" class="laneTitle">Stable interface contracts</text>
  <g><rect x="40" y="1045" width="250" height="72" rx="12" class="contract"/><text x="165" y="1073" text-anchor="middle" class="contractText">Agent Port Contract</text><text x="165" y="1097" text-anchor="middle" class="small">task · context · result · trace</text></g>
  <g><rect x="307" y="1045" width="250" height="72" rx="12" class="contract"/><text x="432" y="1073" text-anchor="middle" class="contractText">Skill / Tool Contract</text><text x="432" y="1097" text-anchor="middle" class="small">schema · permissions · dependencies</text></g>
  <g><rect x="574" y="1045" width="250" height="72" rx="12" class="contract"/><text x="699" y="1073" text-anchor="middle" class="contractText">Policy / Change Contract</text><text x="699" y="1097" text-anchor="middle" class="small">decision · approval · rollback</text></g>
  <g><rect x="841" y="1045" width="250" height="72" rx="12" class="contract"/><text x="966" y="1073" text-anchor="middle" class="contractText">Event / Observation Contract</text><text x="966" y="1097" text-anchor="middle" class="small">source · time · evidence · trace</text></g>
  <g><rect x="1108" y="1045" width="250" height="72" rx="12" class="contract"/><text x="1233" y="1073" text-anchor="middle" class="contractText">Data Contract</text><text x="1233" y="1097" text-anchor="middle" class="small">schema · lineage · freshness</text></g>
  <g><rect x="1375" y="1045" width="250" height="72" rx="12" class="contract"/><text x="1500" y="1073" text-anchor="middle" class="contractText">Identity / SecretRef Contract</text><text x="1500" y="1097" text-anchor="middle" class="small">principal · scope · opaque reference</text></g>
  <text x="40" y="1170" class="small">读图：上到下为依赖与执行主路径；右侧蓝色虚线为治理下发；紫色虚线为证据反馈。实线节点 = v0.1，虚线节点 = 平台化阶段，点线节点 = 未来蓝图。</text>
  <text x="40" y="1200" class="small">演进原则：MVP 少实现模块，但始终使用稳定契约；Capability View 可重建；Amazon 特例留在 Domain Adapter；任何写入都经过授权、协调、审计和回滚。</text>
</svg>
